{% extends 'base.html' %}
{% load static %}

{% block title %}Dashboard | Angelow CRM{% endblock %}

{% block content %}
<div class="container">
    <!-- Header Section -->
    <div class="main-header">
        <div class="d-flex align-items-center gap-3">
            <img src="{% static 'img/logo.png' %}" alt="Angelow CRM" style="max-height: 55px;">
            <div>
                <h1 class="mb-0">ANGELOW CRM</h1>
                <p class="text-muted mb-0">Gestión inteligente de clientes</p>
            </div>
        </div>
    </div>

    <!-- Categories Filter -->
    <div class="categories-filter">
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <button class="btn btn-filter active" data-category="all">Todos</button>
            <button class="btn btn-filter" data-category="niño">Niño</button>
            <button class="btn btn-filter" data-category="niña">Niña</button>
            <button class="btn btn-filter" data-category="bebé">Bebé</button>
            <button class="btn btn-filter" data-category="popular">Popular</button>
        </div>
    </div>

    <!-- Products Grid -->
    <section>
        <div class="container">
            <h2 class="section-title">Nuevos Lanzamientos</h2>
            <div class="product-grid" id="productGrid">
                <!-- Productos renderizados via JS -->
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_css %}
<style>
.main-header {
    background: var(--white);
    border-radius: 32px;
    padding: 1.5rem 2rem;
    margin: 1.5rem 2rem 2rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
}

.main-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    margin: 0;
}

.main-header p {
    color: var(--text-secondary);
    margin: 0;
    font-size: 0.9rem;
}

.categories-filter {
    padding: 1rem 0 2rem;
    text-align: center;
}

.btn-filter {
    background: var(--white);
    border: 2px solid var(--border-light);
    border-radius: 50px;
    padding: 0.5rem 1.5rem;
    font-weight: 600;
    color: var(--text-secondary);
    transition: all 0.3s ease;
}

.btn-filter:hover {
    background: var(--bg-soft);
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-2px);
}

.btn-filter.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(94, 157, 230, 0.25);
}

.section-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 1.5rem;
    position: relative;
    display: inline-block;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 50px;
    height: 3px;
    background: var(--primary);
    border-radius: 2px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 1rem;
}

.product-card {
    background: var(--white);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.4s ease;
    position: relative;
    border: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
}

.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px var(--shadow-hover);
    border-color: var(--accent);
}

.product-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--primary);
    color: white;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    z-index: 2;
}

.product-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 8px;
    z-index: 2;
}

.action-btn {
    width: 36px;
    height: 36px;
    background: var(--white);
    border: 1px solid var(--border-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

.action-btn:hover {
    background: var(--primary);
    color: white;
    transform: scale(1.1);
}

.action-btn.favorite.active { color: #e74c3c; }

.product-image {
    height: 240px;
    background: var(--bg-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
}

.product-card:hover .product-image img {
    transform: scale(1.05);
}

.product-info {
    padding: 1.2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
}

.product-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 0.25rem;
}

.product-category {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
}

.product-price {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--primary-light);
    margin: 0.5rem 0;
}

.stock-badge {
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.stock-ok { color: var(--success); }
.stock-low { color: var(--warning); }
.stock-out { color: var(--error); }

.btn-group-product {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
}

.btn-buy {
    flex: 1;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 0.75rem;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-buy:hover:not(:disabled) {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(94, 157, 230, 0.3);
}

.btn-buy:disabled {
    background: #94a3b8;
    cursor: not-allowed;
}

@media (max-width: 992px) {
    .main-header { margin: 1rem; }
    .product-grid { gap: 1.5rem; }
}

@media (max-width: 768px) {
    .product-image { height: 200px; }
    .product-grid { grid-template-columns: 1fr; }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const STATIC_URL = "{% static '' %}";
const products = [
    { id: 1, name: "Conjunto Size", category: "popular", price: 899900, stock: 8, image: STATIC_URL + "img/productos/conjunto_size.png" },
    { id: 2, name: "Body Niño", category: "niño", price: 899900, stock: 15, image: STATIC_URL + "img/productos/conjunto_Deportive.png" },
    { id: 3, name: "Jogger Niño", category: "niño", price: 899900, stock: 5, image: STATIC_URL + "img/productos/conjunto_jhogger.png" },
    { id: 4, name: "Conjunto Deportivo", category: "popular", price: 899900, stock: 12, image: STATIC_URL + "img/productos/conjunto_Deportive.png" },
    { id: 5, name: "Set Bebé", category: "bebé", price: 899900, stock: 0, image: STATIC_URL + "img/productos/conjunto_size.png" },
    { id: 6, name: "Vestido Verano", category: "niña", price: 699900, stock: 20, image: STATIC_URL + "img/productos/vestido_verano.png" }
];

let favorites = JSON.parse(localStorage.getItem('angelow_favorites')) || [];

function renderProducts(category = 'all') {
    const container = document.getElementById('productGrid');
    const filtered = category === 'all' ? products : products.filter(p => p.category === category);
    
    container.innerHTML = filtered.map(p => {
        const isFav = favorites.includes(p.id);
        const stockClass = p.stock === 0 ? 'stock-out' : (p.stock < 10 ? 'stock-low' : 'stock-ok');
        const stockText = p.stock === 0 ? 'Agotado' : (p.stock < 10 ? `Últimas ${p.stock}` : `En stock (${p.stock})`);
        
        return `
        <div class="product-card">
            <span class="product-badge">${p.category}</span>
            <div class="product-actions">
                <div class="action-btn favorite ${isFav ? 'active' : ''}" data-id="${p.id}">
                    <i class="fas fa-heart"></i>
                </div>
            </div>
            <div class="product-image">
                <img src="${p.image}" alt="${p.name}" onerror="this.src='${STATIC_URL}img/default.png'">
            </div>
            <div class="product-info">
                <h3 class="product-title">${p.name}</h3>
                <span class="stock-badge ${stockClass}"><i class="fas fa-box"></i> ${stockText}</span>
                <div class="product-price">COP $${p.price.toLocaleString()}</div>
                <div class="btn-group-product">
                    <button class="btn-buy" ${p.stock === 0 ? 'disabled' : ''}>
                        <i class="fas fa-shopping-cart me-1"></i> Agregar
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');

    document.querySelectorAll('.favorite').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = parseInt(btn.dataset.id);
            const idx = favorites.indexOf(id);
            if (idx === -1) favorites.push(id); else favorites.splice(idx, 1);
            btn.classList.toggle('active');
            localStorage.setItem('angelow_favorites', JSON.stringify(favorites));
        });
    });

    document.querySelectorAll('.btn-buy').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const card = e.target.closest('.product-card');
            const title = card.querySelector('.product-title').textContent;
            alert(`¡Añadido al carrito! ${title}`);
        });
    });
}

document.querySelectorAll('.btn-filter').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelector('.btn-filter.active').classList.remove('active');
        btn.classList.add('active');
        renderProducts(btn.dataset.category);
    });
});

renderProducts();
</script>
{% endblock %}
