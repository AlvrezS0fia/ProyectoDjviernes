<!-- website/templates/website/login.html -->
{% extends 'website/base.html' %}

{% block title %}Iniciar Sesión - ANGELOW{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center" style="background: #EDF4FC;">
                <h4 class="mb-0" style="color: #1E3A8A;">
                    <i class="fas fa-sign-in-alt me-2" style="color: #5E9DE6;"></i> Iniciar Sesión
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario o Email</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        {{ form.password }}
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">Recordarme</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    ¿No tienes cuenta? <a href="{% url 'website:register' %}" class="fw-bold" style="color: #5E9DE6;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
